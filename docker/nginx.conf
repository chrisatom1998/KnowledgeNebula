worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  types {
    application/wasm wasm;
    application/javascript mjs;
    application/octet-stream onnx;
  }

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Match SECURITY_HEADERS in vite.config.ts / scripts/serve.mjs.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # Windows portable .exe only — file(s) in /usr/share/nginx/downloads/
    location /downloads/ {
      alias /usr/share/nginx/downloads/;
      autoindex on;
      default_type application/octet-stream;

      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
    }

    # Deny subdirectories (e.g. win-unpacked/) if ever mounted by mistake.
    location ~ ^/downloads/.+/ {
      return 404;
    }

    location ~* \.(js|css|wasm|woff2?|png|svg|ico|onnx|mjs)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
    }
  }
}
